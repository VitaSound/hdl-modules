repo:
  name: hdl-modules
  description_ru: Репозиторий, в котором будут собраны все модули
  legacy_source: https://github.com/UA3MQJ/fpga-synth
  github: VitaSound/hdl-modules
  branch: master
  iverilog_guide: https://iverilog.fandom.com/wiki/Installation_Guide#Ubuntu_Linux
  sandbox_link: https://sites.google.com/site/analogsynthdiy/sobstvennye-razrabotki/sintezator-na-baze-plis/z---ssylki
  daw:
    title_ru: VitaSound Remote Synth (DAW ↔ Verilator)
    intro_ru: Плагин VST3 и UDP-engine для Reaper / других DAW
    links:
      - name: VST
        path: vst_bridge/README.md
        hint: сборка `vst_bridge/scripts/build_windows_mingw.sh` (Win) или `build_linux.sh` (Linux)
      - name: Engine
        path: hdl-modules-tester/README.md
        hint: "`make` или `hdl-modules-tester/scripts/build_windows_mingw.sh`"
      - name: Сеть WSL
        path: docs/WSL_NETWORKING.md
        hint: null

categories:
  - id: common
    title_ru: Common
    subtitle_ru: Модули общего назначения и вспомогательные
    readme: common/README.md
    modules:
      - id: powerup_reset
        description_ru: Генератор автоматического сигнала сброса и сброса по кнопке
        source: common/powerup_reset.v
        test_dir: common/powerup_reset_test
        sources:
          - common/powerup_reset.v
        gtkw: common/powerup_reset_test/test.gtkw
        image: common/powerup_reset_test/test.png

      - id: frqdivmod
        description_ru: Целочисленный делитель частоты на 2, 3, 4 итд
        source: common/frqdivmod.v
        test_dir: common/frqdivmod_test
        sources:
          - common/frqdivmod.v
          - common/strobe_gen.v
        gtkw: common/frqdivmod_test/test.gtkw
        image: common/frqdivmod_test/test.png

      - id: strobe_gen
        description_ru: Формирователь строба шириной 1 clk от нч сигнала (например, от целочисленного делителя)
        source: common/strobe_gen.v
        test_dir: common/strobe_gen_test
        sources:
          - common/frqdivmod.v
          - common/strobe_gen.v
        gtkw: common/strobe_gen_test/test.gtkw
        image: common/strobe_gen_test/test.png

      - id: param_reg
        description_ru: "Регистр параметра с записью по strobe wr (param_reg WIDTH; обёртки reg7 — MIDI CC, reg14 — ADSR A/D/R, pitch)"
        source: common/param_reg.v
        test_dir: common/param_reg_test
        sources:
          - common/param_reg.v
          - common/reg7.v
          - common/reg14.v
        gtkw: common/param_reg_test/test.gtkw
        image: common/param_reg_test/test.png

      - id: reg_sr
        description_ru: "SR-регистр gate: set (NoteOn) / reset (NoteOff); замена legacy reg_rs"
        source: common/reg_sr.v
        test_dir: common/reg_sr_test
        sources:
          - common/reg_sr.v
        gtkw: common/reg_sr_test/test.gtkw
        image: common/reg_sr_test/test.png

  - id: io
    title_ru: I/O (граница ПЛИС)
    subtitle_ru: Интерфейсы с внешним миром; к модулям обычно прилагается внешняя схема (опторазвязка MIDI IN, ЦАП)
    readme: io/README.md
    modules:
      - id: midi_in
        description_ru: "MIDI byte parser: channel voice → ch_message/lsb/msb; SysEx skip (v1); UART — на плате"
        source: io/midi_in.v
        test_dir: io/midi_in_test
        sources:
          - io/midi_in.v
        gtkw: io/midi_in_test/test.gtkw
        image: io/midi_in_test/test.png

  - id: generation
    title_ru: Генерация
    packages:
      - id: dds
        title: DDS
        description_en: DDS generator module
        description_ru: Генератор базовой цифровой пилы
        readme: dds/README.md
        source: dds/dds.v
        test_dir: dds/test
        sources:
          - dds/dds.v
        gtkw: dds/test/test.gtkw
        image: dds/test/test.png

      - id: note2dds
        title: note2dds
        description_ru: "MIDI note → DDS phase increment; таблица 12 semitones, параметр CLK_HZ"
        source: dds/note2dds.v
        test_dir: dds/note2dds_test
        sources:
          - dds/note2dds.v
        gtkw: dds/note2dds_test/test.gtkw
        image: dds/note2dds_test/test.png

      - id: note_pitch2dds
        title: note_pitch2dds
        description_ru: "Note + pitch wheel + LFO pitch → DDS adder (dual note2dds + interp)"
        source: dds/note_pitch2dds.v
        test_dir: dds/note_pitch2dds_test
        sources:
          - dds/note_pitch2dds.v
          - dds/note2dds.v
        gtkw: dds/note_pitch2dds_test/test.gtkw
        image: dds/note_pitch2dds_test/test.png

      - id: mono_voice
        title: Mono voice
        description_ru: "Моно-голос: note_pitch2dds → dds → mux форм → adsr → vca; OUT_WIDTH параметр (дефолт 16)"
        readme: mono_voice/README.md
        source: mono_voice/mono_voice.v
        test_dir: mono_voice/test
        sources:
          - mono_voice/mono_voice.v
          - dds/note2dds.v
          - dds/note_pitch2dds.v
          - dds/dds.v
          - dds_transform/dds2saw.v
          - dds_transform/dds2revsaw.v
          - dds_transform/dds2tria.v
          - dds_transform/dds2square.v
          - dds_transform/dds2pwm.v
          - dds_transform/dds2sin.v
          - adsr/adsr.v
          - common/frqdivmod.v
          - common/strobe_gen.v
          - vca/svca_wide.v
          - vca/svca.v
        gtkw: mono_voice/test/test.gtkw
        image: mono_voice/test/test.png

      - id: dds_transform
        title: DDS transform
        description_ru: Преобразователи формы базовой цифровой пилы и синус
        readme: dds_transform/README.md
        test_dir: dds_transform/test
        sources:
          - dds/dds.v
          - dds_transform/dds2tria.v
          - dds_transform/dds2saw.v
          - dds_transform/dds2revsaw.v
          - dds_transform/dds2square.v
          - dds_transform/dds2pwm.v
          - dds_transform/dds2sin.v
        gtkw: dds_transform/test/test.gtkw
        image: dds_transform/test/test.png
        variants:
          - file: dds_transform/dds2saw.v
            label_ru: пила
          - file: dds_transform/dds2revsaw.v
            label_ru: обратная пила
          - file: dds_transform/dds2tria.v
            label_ru: треугольник
          - file: dds_transform/dds2square.v
            label_ru: меандр
          - file: dds_transform/dds2pwm.v
            label_ru: PWM c 7-битной регулировкой %
          - file: dds_transform/dds2sin.v
            label_ru: "синус (WIDTH, LUT_BITS; дефолт 32×8 точек)"

      - id: vca
        title: VCA
        description_ru: "Модули VCA. 8 и 32 битные. Формат данных целочисленный без знака. То есть от 0 до N с центром в N/2."
        readme: vca/README.md
        test_dir: vca/test
        sources:
          - vca/svca.v
          - vca/svca32.v
          - vca/svca_wide.v
          - dds/dds.v
          - dds_transform/dds2square.v
          - dds_transform/dds2tria.v
        gtkw: vca/test/test.gtkw
        image: vca/test/test.png
        variants:
          - file: vca/svca.v
            label: vca 8bit cv, in, out
          - file: vca/svca_wide.v
            label: vca 8bit cv, in, 16bit out
          - file: vca/svca32.v
            label: vca 32 bit cv, in, out

      - id: rnd
        title: RND
        description_ru: Модули генерации псевдослучайных чисел 1, 8, n бит.
        readme: rnd/README.md
        test_dir: rnd/test
        sources:
          - rnd/rnd1.v
          - rnd/rnd8.v
          - rnd/rndx.v
        gtkw: rnd/test/test.gtkw
        image: rnd/test/test.png
        variants:
          - file: rnd/rnd1.v
            label: rnd 1bit
          - file: rnd/rnd8.v
            label: rnd 8 bit
          - file: rnd/rndx.v
            label: rnd x bit (1..32)

      - id: adsr
        title: ADSR
        description_ru: Генератор огибающей ADSR
        readme: adsr/README.md
        source: adsr/adsr.v
        test_dir: adsr/test
        sources:
          - adsr/adsr.v
          - common/frqdivmod.v
          - common/powerup_reset.v
          - common/strobe_gen.v
        gtkw: adsr/test/test.gtkw
        image: adsr/test/test.png
