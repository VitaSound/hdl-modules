name: test-and-docs

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            iverilog \
            gtkwave \
            xvfb \
            python3-yaml \
            python3-jinja2 \
            python3-pil \
            python3-numpy \
            python3-matplotlib

      - name: Run simulations
        run: make test

      - name: Render waveform images (smoke test)
        run: make images

      - name: Generate README from modules.yaml
        run: make docs

      - name: Verify README and modules.yaml are up to date
        run: |
          git diff --stat -- README.md modules.yaml '**/README.md'
          git diff --exit-code -- README.md modules.yaml '**/README.md'
          test -z "$(git status --porcelain -- README.md modules.yaml '**/README.md')"
