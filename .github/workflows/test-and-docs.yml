name: test-and-docs

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            iverilog \
            gtkwave \
            xvfb \
            python3-yaml \
            python3-jinja2 \
            python3-pil

      - name: Run simulations
        run: make test

      - name: Render waveform images
        run: make images

      - name: Generate README from modules.yaml
        run: make docs

      - name: Verify committed artifacts are up to date
        run: |
          git diff --stat
          git diff --exit-code
          test -z "$(git status --porcelain)"
